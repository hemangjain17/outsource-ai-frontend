<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outsource AI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="app">
    <!-- Layout Container -->
    <div class="layout">
      <aside class="sidebar glass-panel">
        <div class="logo">
          <span class="gradient-text">Outsource AI</span>
        </div>
        <nav>
          <a href="#" data-route="dashboard" class="nav-link active">Overview</a>
          <a href="#" data-route="onboard" class="nav-link">Onboarding</a>
          <a href="#" data-route="campaigns" class="nav-link">Campaigns</a>
          <!-- <a href="#" data-route="tasks_assign" class="nav-link">Task Assignment</a> -->
          <a href="#" data-route="logs" class="nav-link">Pipeline Logs</a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="topbar glass-panel">
          <h1 id="page-title">Overview</h1>
          <div style="display: flex; align-items: center; gap: 12px;">
            <div id="company-status" class="status-badge hidden">NO COMPANY SELECTED</div>
            <button class="theme-toggle" id="theme-toggle-btn" title="Toggle Light/Dark Mode">🌙</button>
          </div>
        </header>

        <div id="view-container" class="view-container">
          <!-- Dynamic Content Injected Here -->
        </div>
      </main>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
